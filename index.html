<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Photos</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #111111;
        font-family: Arial, sans-serif;
      }

      #status {
        text-align: center;
        padding: 10px 12px;
        font-size: 14px;
      }

      #pages {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 8px 0 16px;
      }

      .page {
        width: 100%;
        margin: 0 0 10px;
        display: block;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  </head>
  <body>
    <div id="status">Loading photos...</div>
    <main id="pages"></main>

    <script>
      const statusEl = document.getElementById("status");
      const pagesEl = document.getElementById("pages");

      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      async function renderPage(page) {
        const deviceScale = window.devicePixelRatio || 1;
        const maxWidth = Math.min(window.innerWidth, 1200);
        const baseViewport = page.getViewport({ scale: 1 });
        const cssScale = maxWidth / baseViewport.width;
        const viewport = page.getViewport({ scale: cssScale });

        const canvas = document.createElement("canvas");
        canvas.className = "page";
        canvas.width = Math.floor(viewport.width * deviceScale);
        canvas.height = Math.floor(viewport.height * deviceScale);
        canvas.style.width = `${Math.floor(viewport.width)}px`;
        canvas.style.height = `${Math.floor(viewport.height)}px`;

        const context = canvas.getContext("2d", { alpha: false });
        context.setTransform(deviceScale, 0, 0, deviceScale, 0, 0);

        await page.render({ canvasContext: context, viewport }).promise;
        pagesEl.appendChild(canvas);
      }

      async function renderPart(file) {
        const loadingTask = pdfjsLib.getDocument(file);
        const doc = await loadingTask.promise;

        for (let p = 1; p <= doc.numPages; p += 1) {
          const page = await doc.getPage(p);
          await renderPage(page);
        }
      }

      async function run() {
        try {
          const res = await fetch("weddingpix_parts.json", { cache: "no-store" });
          if (!res.ok) throw new Error("Missing album files.");
          const manifest = await res.json();
          if (!manifest.parts || !manifest.parts.length) {
            throw new Error("No album parts found.");
          }

          for (let i = 0; i < manifest.parts.length; i += 1) {
            statusEl.textContent = `Loading photos (${i + 1}/${manifest.parts.length})...`;
            await renderPart(manifest.parts[i].file);
          }

          statusEl.remove();
        } catch (err) {
          statusEl.textContent = `Could not load album: ${err.message}`;
        }
      }

      run();
    </script>
  </body>
</html>
